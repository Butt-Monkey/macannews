name: Обновление ленты Telegram

# Читает новые посты канала через официальный Bot API Telegram
# (api.telegram.org) — предыдущий способ (чтение t.me/s/<канал> напрямую)
# упёрся в устойчивую DNS-блокировку домена t.me именно с сети GitHub Actions.
# Бот должен быть администратором канала, токен лежит в секрете TG_BOT_TOKEN
# (Settings → Secrets and variables → Actions).

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Собрать news.json через Bot API
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: node .github/scripts/fetch-news.mjs

      - name: Закоммитить, если лента изменилась
        run: |
          if [ -n "$(git status --porcelain -- news.json assets/news .github/state)" ]; then
            git config user.name "87-news-bot"
            git config user.email "actions@users.noreply.github.com"
            git add news.json assets/news .github/state
            git commit -m "auto: обновление ленты Telegram"
            git push
          else
            echo "Без изменений — новых постов нет"
          fi
