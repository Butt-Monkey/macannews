name: Разовый бэкфилл из пересланных постов

# ОДНОРАЗОВЫЙ workflow — не запускается сам по расписанию, только вручную
# (Run workflow). Забирает посты, которые ты вручную переслал (Forward) из
# канала в личку своему боту, и добавляет их в news.json. После использования
# этот файл и .github/scripts/backfill-from-forwards.mjs можно удалить —
# обычная лента (telegram-news.yml) продолжит работать как обычно.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Забрать пересланные посты
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: node .github/scripts/backfill-from-forwards.mjs

      - name: Закоммитить результат
        run: |
          if [ -n "$(git status --porcelain -- news.json assets/news)" ]; then
            git config user.name "87-news-bot"
            git config user.email "actions@users.noreply.github.com"
            git add news.json assets/news
            git commit -m "backfill: последние посты из пересланных сообщений"
            git push
          else
            echo "Нечего коммитить"
          fi
