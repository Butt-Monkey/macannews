<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — 87 · Macan News</title>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico"/>
<script>/* тема как на сайте: выбор из localStorage('mn-theme'), дефолт — светлая */
(function(){try{var t=localStorage.getItem('mn-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<style>
@font-face{font-family:'Schibsted Grotesk';font-style:normal;font-weight:800;font-display:swap;src:url(assets/fonts/schibsted-800.woff2) format('woff2')}
:root{--bg:#ece1cd;--ink:#16271d;--soft:rgba(22,39,29,.64);--gold:#9a7a1e;
  --gold-text:linear-gradient(105deg,#6b4f0f 0%,#9c7a18 17%,#d8b64a 39%,#f5e6ad 50%,#cda636 60%,#937214 82%,#5f4a0e 100%)}
:root[data-theme="dark"]{--bg:#0a1610;--ink:#f1ecdc;--soft:rgba(241,236,220,.64);--gold:#cda23a}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;min-height:100svh;display:grid;place-items:center;background:var(--bg);color:var(--ink);
  font-family:system-ui,'Segoe UI',Arial,sans-serif;text-align:center;padding:24px}
.n{font-family:'Schibsted Grotesk',system-ui,'Segoe UI',Arial,sans-serif;font-weight:800;font-size:clamp(96px,28vw,220px);line-height:.9;letter-spacing:-.04em;
  background:var(--gold-text);-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:var(--soft);margin:18px auto 30px;max-width:34ch;line-height:1.6}
a{display:inline-block;padding:14px 30px;border:1px solid var(--gold);border-radius:100px;color:var(--ink);
  text-decoration:none;font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase;transition:background .3s,color .3s}
a:hover{background:var(--gold);color:#1a1410}
</style>
</head>
<body>
<div>
  <div class="n">404</div>
  <p>Такой страницы нет. Мы проверили. Впрочем, мы можем её назначить — но не будем.</p>
  <a href="./">На главную</a>
</div>
</body>
</html>
